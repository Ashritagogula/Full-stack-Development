<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spacings</title>
    <style>
        .first{
            border: 5px solid red;
            font-size: 50px;
            padding: 20px 30px 50px 40px;
        }
        .first:hover{
            background-color: lightblue;
        }
        .second{
            border: 5px solid blue;
            font-size: 50px;
            margin: 40px 50px 10px 50px;
        }
        .parent{
            border: 5px solid green;
            font-size: 20px;
            margin: 30px;
            padding: 40px;
        }
        .child{
            border: 5px solid yellow;
            font-size: 50px;
            margin: 20px;
            padding: 30px;
        }
    </style>
</head>
<body>
    <div class="first">
        <h1>Technicalhub</h1>
        <p>Internal Spacing</p>
    </div>
    <div class="second">
        <h1>Technicalhub</h1>
        <p>External Spacing</p>
    </div>
    <div class="parent">
        <div class="child">
            <h1>Technicalhub</h1>
            <p>Internal Spacing</p>
        </div>
    
    
</body>
</html>
