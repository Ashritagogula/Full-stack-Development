<!DOCTYPE html>
<html>
<head>
  <title>Voice Button</title>

  <style>
    button {
      font-size: 20px;
      padding: 10px 20px;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    button:hover {
      background-color: #45a049;
    }
  </style>
</head>
<body>

<h2>Tap the Button to Hear the Voice</h2>

<button onclick="speakText()">Tap Me</button>

<script>
  function speakText() {
    let msg = new SpeechSynthesisUtterance("Hello! This button says something when tapped.");
    msg.rate = 1;         // speed of voice
    msg.pitch = 1;        // tone
    msg.lang = "en-US";   // language
    speechSynthesis.speak(msg);
  }
</script>

<h2 id="typewriter"></h2>

<script>
    let text = "Welcome to EduBridge! Helping students find their path...";
    let i = 0;

    function typeWriter() {
        if (i < text.length) {
            document.getElementById("typewriter").innerHTML += text.charAt(i);
            i++;
            setTimeout(typeWriter, 100);
        }
    }

    window.onload = typeWriter;
</script>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
<button onclick="confetti()">Celebrate!</button>

<button onclick="toggleMode()">Toggle Theme</button>

<script>
    function toggleMode() {
        document.body.classList.toggle("dark-mode");
    }

    document.head.innerHTML += `<style>
  .dark-mode {
    background-color: #121212;
    color: white;
  }
</style>`;
</script>

<button onclick="startListening()">Speak Now</button>
<p id="output"></p>


<!-- description -->
<script>
    function startListening() {
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'en-US';
        recognition.onresult = function (event) {
            document.getElementById("output").innerText = "You said: " + event.results[0][0].transcript;
        };
        recognition.start();
    }
</script>

<p id="timer">Time left: 10 seconds</p>
<p id="question"></p>

<script>
    let questions = [
        "What is HTML?",
        "What is CSS?",
        "What does JS stand for?",
        "What is a tag?",
        "What is a class in CSS?",
        "What is an array?",
        "What is a loop?",
        "What is a function?",
        "What is a variable?",
        "What is Git?"
    ];

    let current = 0;
    let timeLeft = 10;
    let timer;

    function loadQuestion() {
        if (current < questions.length) {
            document.getElementById("question").innerText = `Q${current + 1}: ${questions[current]}`;
            timeLeft = 10;
            document.getElementById("timer").innerText = `Time left: ${timeLeft} seconds`;

            timer = setInterval(() => {
                timeLeft--;
                document.getElementById("timer").innerText = `Time left: ${timeLeft} seconds`;

                if (timeLeft === 0) {
                    clearInterval(timer);
                    current++;
                    loadQuestion();
                }
            }, 1000);
        } else {
            document.getElementById("question").innerText = "Quiz completed!";
            document.getElementById("timer").innerText = "";
        }
    }

    loadQuestion();
</script>


<select id="difficulty">
    <option value="easy">Easy</option>
    <option value="medium">Medium</option>
    <option value="hard">Hard</option>
</select>
<button onclick="startQuiz()">Start Quiz</button>

<script>

        alert(`You chose ${level} level. Starting quiz...`);

    }

</script>
