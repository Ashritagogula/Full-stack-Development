<!DOCTYPE html>
<html>

<head>
    <title>Task 8</title>
</head>

<body>
    <form>
        <table border="1" cellspacing="0" cellpadding="5">
            <tr>
                <td colspan="2" align="center">
                    <h1>Application Form</h1>
                </td>
            <tr>
                <td><label>User name:</label></td>
                <td><input type="text" " required /></td>
            </tr>
            <tr>
                <td><label>Password:</label></td>
                <td><input type="password" " required /></td>
            </tr>
            <tr>
                <td><label>City of Employment:</label></td>
                <td><input type="text"  required /></td>
            </tr>
            <tr>
                <td><label>Web server:</label></td>
                <td>
                    <select required>
                        <option>--Choose a server--</option>
                        <option>IIS</option>
                        <option>NGINX</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td><label>Please specify your role:</label></td>
                <td>
                    <input type="radio" name="role" /> Admin  <br>
                    <input type="radio" name="role" /> Engineer <br>
                    <input type="radio" name="role" /> Manager <br>
                    <input type="radio" name="role" /> Guest <br
                </td>
            </tr>
            <tr>
                <td><label>Single Sign-on to the following:</label></td>
                <td>
                    <input type="checkbox" /> Mail <br>
                    <input type="checkbox" /> Payroll <br>
                    <input type="checkbox" /> Self-service <br>
                </td>
            </tr>
            <tr>
                <td colspan="2" align="center">
                    <input type="submit" value="Login" />
                    <input type="reset" value="Reset" />
                </td>
            </tr>
        </table>
    </form>
</body>

</html>
