<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animations</title>
    <style>
        .Demo{
            width: 100px;
            height: 100px;
            animation-name: Demoanimation;
            animation-duration: 2s;
            border: 3px solid rgb(228, 199, 199);
            animation-iteration-count: infinite;   
        }

        .Demo1{
            width: 100px;
            height: 100px;
            animation-name: Demoanimation1;
            animation-duration: 2s;
            border: 3px solid rgb(228, 199, 199);
            animation-iteration-count: infinite;  
            position: relative;
            margin-top: 14px;

        }

        .Stages{
            width: 100px;
            height: 100px;
            animation-name: Demoanimation2;
            animation-duration: 2s;
            border: 3px solid rgb(228, 199, 199);
            animation-iteration-count: infinite;  
            position: relative;
            margin-top: 14px;

        }


        @keyframes Demoanimation {
            from{
                background-color: black;
            }
            to{
                background-color: red;
            }
        }

        @keyframes Demoanimation1 {
            from{
                left:0px;
                background-color: black;
                border-radius: 0px;
            }
            to{
                left: 400px;
                background-color: red;
                border-radius: 50%;
            }
        }

        @keyframes Demoanimation2 {
            0%{
                background-color: black;
            } 
            50%{
                background-color: red;
            }
            100%{
                background-color: blue;
            }            
        }

        .demo2, .demo3, .demo4{
            margin: 20px;
        }
        .demo2{
            width: 150px;
            height: 150px;
            border: 1px solid black;
            position: relative;
            animation-name: myanimation;
            animation-duration: 2s;
            animation-timing-function: linear;
            animation-iteration-count: infinite;
            animation-direction: alternate-reverse;
        }

        .demo3{
            width: 150px;
            height: 150px;
            border: 1px solid black;
            position: relative;
            animation-name: myanimation1;
            animation-duration: 3s;
            animation-timing-function: linear;
            animation-iteration-count: infinite;
        }
        .demo4{
            width: 150px;
            height: 150px;
            border: 1px solid black;
            position: relative;
            animation-name: myanimation2;
            animation-duration: 4s;
            animation-timing-function: linear;
            animation-iteration-count: infinite;
            animation-direction: alternate-reverse;
        }

        @keyframes myanimation{
            0%{
                left: 0px;
                background-color: #1B3C53;
            }
            50%{
                left: 200px;
                background-color: #456882;
                border-radius: 25%;
            }
            75%{
                border-radius: 40%;
                background-color: #D2C1B6;
            }
            100%{
                left: 400px;
                background-color: #F9F3EF;
                border-radius: 50%;
            }
        }

        @keyframes myanimation1{
            0%{
                left: 0px;
                background-color: #555879;
            }
            50%{
                left: 200px;
                background-color: #98A1BC;
                border-radius: 25%;
            }
            75%{
                border-radius: 40%;
                background-color: #DED3C4;
            }
            100%{
                left: 400px;
                background-color: #F4EBD3;
                border-radius: 50%;
            }
        }

        @keyframes myanimation2{
            0%{
                left: 0px;
                background-color: #819A91;
            }
            50%{
                left: 200px;
                background-color: #A7C1A8;
                border-radius: 25%;
                transform: rotateX(45deg);
            }
            75%{
                border-radius: 40%;
                background-color: #D1D8BE;
                transform: rotateX(80deg);
            }
            100%{
                left: 400px;
                background-color: EEEFE0;
                border-radius: 50%;
                transform: rotateX(160deg);
            }
        }

    </style>
</head>
<body>
    <div class="Demo">

    </div>
    <div class="Demo1">
    
    </div>
    <div class="Stages">

    </div>

    <hr>
    <div class="demo2"></div>
    <div class="demo3"></div>
    <div class="demo4"></div>
</body>
</html>
