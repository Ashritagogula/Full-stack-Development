<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu</title>
    <style>
        body{
            margin: 0;
            background-color: #57564F;
        }

        .side-bar{
            width: 300px;
            height: 100svh;
            background-color: #7A7A73;
            display: flex;
            flex-direction: column;
            position: absolute;
            left: 0px;    
            transition: 0.5s left linear;       
        }

        .side-bar div{
            padding: 20px;
            border-radius: 3px;
            border: 1px solid rgba(0, 0, 0, 0.64);
        }

        .side-bar div:hover{
            background-color: rgba(255, 254, 254, 0.462);
            border-bottom: 1px solid rgba(255, 255, 255, 0.534);
        }

        span{
            color: white;
            font-size:30px;
            object-fit: cover;
        }

    </style>
</head>
<body>
    <button onclick="Close()">&#19977; </button>
    <span onclick="Open()">&times;</span>
    
    <div class="side-bar">
        <div class="home">Home</div>
        <div class="about">About</div>
        <div class="blog">Blog</div>
        <div class="services">Services</div>
        <div class="help">Help</div>
    </div>

    <script>
        function Close(){
            document.getElementsByClassName("side-bar")[0].style = "left:-300px";
        }

        function Open(){
            document.getElementsByClassName("side-bar")[0].style = "left:0";
        }
    </script>
</body>
</html>
