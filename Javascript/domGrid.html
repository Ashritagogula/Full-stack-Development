<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grid</title>
    <style>
        body {
            background-color: rgba(146, 178, 179, 0.716);
            font-family: Arial, sans-serif;
        }

        input {
            font-size: 20px;
            background-color: rgb(212, 223, 212);
            margin: 5px;
        }

        button {
            font-size: 20px;
            padding: 5px 15px;
        }

        #gridContainer {
            display: grid;
            margin-top: 20px;
            gap: 10px;
        }

        .grid-item {
            background-color: white;
            border: 1px solid black;
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .grid-item:nth-child(1){
            background:url(girl.gif) no-repeat;
            background-size: cover;
            
        }
    </style>
</head>

<body>
    <h3>Enter Number of rows: <input type="text" id="rows" required /></h3>
    <h3>Enter Number of columns: <input type="text" id="cols" required /></h3>
    <button onclick="Grids()">Click</button>

    <div id="gridContainer"></div>

    <script>
        function Grids() {
            let rows = parseInt(document.getElementById("rows").value);
            let cols = parseInt(document.getElementById("cols").value);

            let gridContainer = document.getElementById("gridContainer");

            gridContainer.innerHTML = "";

            gridContainer.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;

            for (let i = 1; i <= rows * cols; i++) {
                let box = document.createElement("div");
                box.className = "grid-item";
                box.innerText = i;
                gridContainer.appendChild(box);
            }
        }
    </script>
</body>

</html>
