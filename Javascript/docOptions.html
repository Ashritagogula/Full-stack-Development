<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM</title>
    <style>
        button{
            background-color: rgba(63, 193, 193, 0.444);
            font-size: 40px;
        }
        input{
            font-size: 40px;
        }
    </style>
</head>
<body>
    <input type="text" required/>
    <input type="text" required/>
    <button onclick="Tap()">Click</button>
    <script>
        function Tap(){
            var element = document.getElementsByTagName('input')[0].value;
            let newElement = document.createElement(element);
            console.log(newElement);
            var data = document.getElementsByTagName('input')[0].value;
            newElement.innerText = data
            newElement.setAttribute("class","heading");
            let parent = document.getElementsByTagName("body")[0];
            parent.appendChild(newElement)
        }
    </script>
</body>
</html>
