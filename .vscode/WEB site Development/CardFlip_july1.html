<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CardFlipping</title>
    <style>

        body{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100svh;
        }

        .grandparent{
            perspective: 150px;
        }

        .parent{
            width: 160px;
            height: 160px;
            position: relative;
            border: 1px solid rgb(0, 0, 0);
            transition: transform 1s linear;
            transform-style: preserve-3d;
            
        }

        .parent:hover{
            transform: rotateY(180deg);
        }
        .front{
            position: absolute;
            width: 160px;
            height: 160px;
            background-color: rgb(153, 99, 174);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 17px;
            text-align: center;
            
        }
        .back{
            backface-visibility: hidden;
            position: absolute;
            width: 160px;
            height: 160px;
            background-color: burlywood;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            transform: rotateY(180deg);
        }
    </style>
</head>
<body>

    <div class="grandparent">
        <div class="parent">
            <div class="front">
                Name : G.Ashrita
                Roll No : 23P31A0517
            </div>
            
            <div class="back">
                College : Aditya University
            </div>
        </div>
    </div>
    
    
    
</body>
</html>
