<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Solar System</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: black;
           
            
        }

        .wall {
            position: fixed; /* so it stays fixed behind everything */
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-repeat: no-repeat;
            background-size: cover; /* to fill the whole screen */
            background-position: center;
            z-index: -1;
            opacity: 0.8;
            background-image: url(gallexy2.jpg);
        }
        .parent {
            position: relative;
            transform: scale(0.4); /* Shrink entire solar system */
            transform-origin: center;
        }
        

        .sun {
            width: 300px;
            height: 300px;
            background-image: url(sun3.png);
            background-size: cover;
            border-radius: 50%;
            z-index: 2;
            position: relative;
            animation: sun-glow 2s ease-in-out infinite;
            box-shadow: 0 0 40px 20px rgba(255, 140, 0, 0.5); /* Initial glow */
        }
        

        @keyframes sun-glow {
            0% {
                box-shadow: 0 0 30px 15px rgba(255, 140, 0, 0.5);
            }
            50% {
                box-shadow: 0 0 60px 30px rgba(255, 200, 0, 0.8);
            }
            100% {
                box-shadow: 0 0 30px 15px rgba(255, 140, 0, 0.5);
            }
        }

        .orbit-ring {
            width: 540px;
            height: 540px;
            border: 2px dashed rgb(255, 255, 255);            border-radius: 50%;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
        }

        .orbit-ring1 {
            width: 640px;
            height: 640px;
            padding: 70px;
            border: 2px dashed rgb(255, 255, 255);            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
        }

        .orbit-ring2 {
            width: 840px;
            height: 840px;
            padding: 70px;
            border: 2px dashed rgb(255, 255, 255);            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
        }

        .orbit-ring3 {
            width: 1040px;
            height: 1040px;
            padding: 70px;
            border: 2px dashed rgb(255, 255, 255);            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
        }

        .orbit-ring4 {
            width: 1240px;
            height: 1240px;
            padding: 70px;
            border: 2px dashed rgb(255, 255, 255);            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
        }
        .orbit-ring5 {
            width: 1440px;
            height: 1440px;
            padding: 70px;
            border: 2px dashed rgb(255, 255, 255);            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
        }
        .orbit-ring6 {
            width: 1640px;
            height: 1640px;
            padding: 70px;
            border: 2px dashed rgb(255, 255, 255);            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
        }
        .orbit-ring7 {
            width: 1840px;
            height: 1840px;
            padding: 70px;
            border: 2px dashed rgb(255, 255, 255);            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
        }

        .mercury-orbit {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: mercuryanimation 3s linear infinite;
            z-index: 1;
        }

        .mercury {
            width: 70px;
            height: 70px;
            background-image: url('mercury.png');
            background-size: cover;
            border-radius: 50%;
            position: absolute;
            top: -10px;
            /* Half of mercury's height */
            left: 240px;
            /* Orbit radius */
        }

        .venus-orbit{
            position: absolute;
            top: 50%;
            left: 50%;
            animation: venusanimation 5s linear infinite;

        }
        .venus{
            width: 90px;
            height: 90px;
            background-image: url(venus.png);
            background-size: cover;
            border-radius: 50%;
            position: absolute;
            top: -10px;
            left: 338px;
        }

        .earth-orbit{
            position: absolute;
            top: 50%;
            left: 50%;
            animation: earthanimation 7s linear infinite;
        }
        .earth{
            width: 90px;
            height: 90px;
            background-image: url(earth.gif);
            border-radius: 50%;
            background-size: cover;
            position: absolute;
            top: -10px;
            left: 440px;

        }

        .mars-orbit{
            position: absolute;
            top: 50%;
            left: 50%;
            animation: marsanimation 9s linear infinite;
        }
        .mars{
            width: 90px;
            height: 90px;
            background-image: url(mars.png);
            border-radius: 50%;
            background-size: cover;
            position: absolute;
            top: -50px;
            left: 540px;
        }

        .jupiter-orbit{
            position: absolute;
            top: 50%;
            left: 50%;
            animation: jupiteranimation 12s linear infinite;
        }
        .jupiter{
            width: 90px;
            height: 90px;
            background-image: url(jupiter.png);
            border-radius: 50%;
            background-size: cover;
            position: absolute;
            top: -50px;
            left: 640px;
        }


        .saturn-orbit{
            position: absolute;
            top: 50%;
            left: 50%;
            animation: saturnanimation 14s linear infinite;
        }
        .saturn{
            width: 100px;
            height: 100px;
            background-image: url(saturn.png);
            border-radius: 50%;
            background-size: cover;
            position: absolute;
            top: -50px;
            left: 740px;
        }

        .uranus-orbit{
            position: absolute;
            top: 50%;
            left: 50%;
            animation: uranusanimation 17s linear infinite;
        }
        .uranus{
            width: 70px;
            height: 70px;
            background-image: url(uranus.png);
            border-radius: 50%;
            background-size: cover;
            position: absolute;
            top: -50px;
            left: 840px;
        }

        .neptune-orbit{
            position: absolute;
            top: 50%;
            left: 50%;
            animation: neptuneanimation 20s linear infinite;
        }

        .neptune{
            width: 80px;
            height: 80px;
            background-image: url(neptune.png);
            border-radius: 50%;
            background-size: cover;
            position: absolute;
            top: -50px;
            left: 940px;
        }

        @keyframes mercuryanimation{
            0% {
                transform: rotateZ(0deg);
            }

            100% {
                transform: rotateZ(360deg);
            }
        }
        @keyframes neptuneanimation{
            0% {
                transform: rotateZ(0deg);
            }

            100% {
                transform: rotateZ(360deg);
            }
        }

        @keyframes  venusanimation {
            0% {
                transform: rotateZ(0deg);
            }

            100% {
                transform: rotateZ(360deg);
            }
        }

        @keyframes earthanimation {
            0% {
                transform: rotateZ(0deg);
            }

            100% {
                transform: rotateZ(360deg);
            }
        }

        @keyframes jupiteranimation{
            0% {
                transform: rotateZ(0deg);
            }

            100% {
                transform: rotateZ(360deg);
            }
        }
        @keyframes marsanimation{
            0% {
                transform: rotateZ(0deg);
            }

            100% {
                transform: rotateZ(360deg);
            }
        }

        @keyframes saturnanimation{
            0% {
                transform: rotateZ(0deg);
            }

            100% {
                transform: rotateZ(360deg);
            }
        }

        @keyframes uranusanimation{
            0% {
                transform: rotateZ(0deg);
            }

            100% {
                transform: rotateZ(360deg);
            }
        }

    </style>
</head>

<body>
    <div class="wall"></div>
    <div class="parent">
        <div class="sun"></div>
        <div class="orbit-ring"></div>
        <div class="mercury-orbit">
            <div class="mercury"></div>
        </div>
        <div class="orbit-ring1"></div>
        <div class="venus-orbit">
            <div class="venus">
            </div>
        </div>
        <div class="orbit-ring2"></div>
        <div class="earth-orbit">
            <div class="earth">

            </div>
        </div>
        <div class="orbit-ring3"></div>
        <div class="mars-orbit">
            <div class="mars">
        
            </div>
        </div>
        <div class="orbit-ring4"></div>
        <div class="jupiter-orbit">
            <div class="jupiter">
        
            </div>
        </div>

        <div class="orbit-ring5"></div>
        <div class="saturn-orbit">
            <div class="saturn">
        
            </div>
        </div>

        <div class="orbit-ring6"></div>
        <div class="uranus-orbit">
            <div class="uranus">
        
            </div>
        </div>

        <div class="orbit-ring7"></div>
        <div class="neptune-orbit">
            <div class="neptune">
        
            </div>
        </div>
    </div>
</body>

</html>
