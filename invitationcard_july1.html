<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display&display=swap" rel="stylesheet">

    <title>Invitation</title>
    <style>
        h1 {
            font-family: '', cursive;
            font-size: 50px;
            margin: 10px 0;
            color: #b8860b;
        }
        
        h3, p {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            margin: 5px 0;
            color: #444;
        }

        h1, h3, p {
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }
        
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100svh;
        }
        .grandparent{
            perspective: 850px;
        }
        
        .parent{
            position: relative;
            width: 570px;
            height: 730px;
            transform-style: preserve-3d;
            transition: transform 1s linear;
            
        }

        .parent:hover{
            transform: rotateY(180deg);
        }

        .front{
            background: url("leftdesign.png") no-repeat ;
            background-size: contain;
            background-repeat: no-repeat;
            position: absolute;
            display: flex;
            text-align: center; 
            flex-direction: column;
            background-color: rgb(255, 255, 255);
            width: 600px;
            height: 860px;
            color: rgb(0, 0, 0);
            border: 2px solid rgb(176, 138, 41);
            z-index:1;
            font-size: 23px;
            backface-visibility: hidden;
            
        }
       .back{
            position: absolute;
            display: flex;
            text-align: center; 
            flex-direction: column;
            background-color: rgb(133, 31, 22);
            width: 600px;
            height: 700px;
            color: white;
            border: 2px solid rgb(176, 138, 41);
            backface-visibility: hidden;
            
            transform: rotateY(180deg);

        }

        .image{
            width: 360px;
            height: 370px;
            position: absolute;
            bottom: 0px;
        }

        .updesign{
            width: 100%;
            height: 120px;
            background-size: cover;
        }
        
    </style>
</head>
<body>
    <div class="grandparent">
        <div class="parent">
            <div class="front">

                <h3>SAVE THE DATE</h3>
                <h1>Aditi AND Advaith</h1>
                <p>11.08.2025</p>
                <img src="Wedimage1.png" class="image">
            </div>
        
            <div class="back">
                You are invited
            </div>
        </div>
    </div>
    
    
</body>
</html>
