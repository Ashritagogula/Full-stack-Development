<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div h1 {
            opacity: 0.9;
        }
        div h2 {
            opacity: 0.5;
        }
        div h3 {
            opacity: 0.2;
        }

    </style>
</head>

<body>
    <p style="color:blue; background-color:black">My Page</p>
    <p style="color:rgb(254, 4, 4); font-size:30px; font-weight:800; background-color:aqua">My Page</p>

    <!-- This will take full width like a block -->
    <strong style="background-color: yellow; display: block;">Hi</strong>

    <div>
        <h1>High Opacity</h1>
        <h2>Medium Opacity</h2>
        <h3>Low Opacity</h3>
    </div>
</body>

</html>
