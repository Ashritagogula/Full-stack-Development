<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid</title>
    <style>
        .one{
            width: 100%;
            height: 700px;
            background-color: lightblue;
            grid-template-columns: 1fr 2fr 1fr;
            /*grid-template-columns: repeat(10,1fr);*/
            grid-template-rows: 2fr 1fr 2fr;
            display: grid;
            color: aliceblue;
            border: 5px solid black;
            font-size: 40px;
        }

        .child{
            border: 2px solid rgb(11, 11, 11);
        }

        .Parent{
            width: 100%;
            height: 700px;
            display: grid;
            grid-template-rows: 1fr 2fr 3fr;
            grid-template-columns: 1fr 2fr 1fr;
            background-color: lightblue;
            border: 2px solid black;
            gap: 5px;
        }
        .child1{
            width: 100px;
            height: 100px;
            align-self: flex-end;
            justify-self: end;
            background-color: black;
        }
        .child2{
            width: 100px;
            height: 100px;
            background-color: rgb(0, 0, 0);
            align-self: flex-end;
            justify-self: center;
        }
        .child3{
            width: 100px;
            height: 100px;
            align-self: flex-end;
            justify-self: start;
            background-color: rgb(0, 0, 0);
        }
        .child4{
            width: 100px;
            height: 100px;
            align-self: center;
            justify-self: end;
            background-color: rgb(0, 0, 0);
        }
        .child5{
            width: 100px;
            height: 100px;
            align-self: center;
            justify-self: center;
            background-color: rgb(7, 8, 9);
        }
        .child6{
            width: 100px;
            height: 100px;
            align-self: center;
            justify-self: start;
            background-color: rgb(0, 0, 0);
        }
        .child7 {
            width: 100px;
            height: 100px;
            align-self: flex-start;
            justify-self: end;
            background-color: rgb(0, 0, 0);
          }
          
          .child8 {
            width: 100px;
            height: 100px;
            align-self: flex-start;
            justify-self: center;
            background-color: rgb(7, 8, 9);
          }
          
          .child9 {
            width: 100px;
            height: 100px;
            align-self: flex-start;
            justify-self: start;
            background-color: rgb(0, 0, 0);
          }
          

    </style>
</head>
<body>
    <div class="one">
        <div class="child">1</div>
        <div class="child">2</div>
        <div class="child">3</div>
        <div class="child">4</div>
        <div class="child">5</div>
        <div class="child">6</div>
        <div class="child">7</div>
        <div class="child">8</div>
    </div>
    <hr>
    <h1>
        TASK
    </h1>
    <div class="Parent">
        <div class="child1">
        </div>
        <div class="child2"></div>
        <div class="child3"></div>
        <div class="child4"></div>
        <div class="child5"></div>
        <div class="child6"></div>
        <div class="child7"></div>
        <div class="child8"></div>
        <div class="child9"></div>


    </div>

</body>
