<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Book Animation</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            perspective: 1000px;
            font-family: Arial, sans-serif;
        }

        .book {
            position: relative;
            width: 300px;
            height: 200px;
            transform-style: preserve-3d;
            transform: rotateY(0deg);
            animation: bookRotate 6s infinite linear;
        }

        @keyframes bookRotate {
            0% {
                transform: rotateY(0deg);
            }

            50% {
                transform: rotateY(180deg);
            }

            100% {
                transform: rotateY(360deg);
            }
        }

        .page {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: #2c3e50;
            border: 1px solid #fff;
            opacity: 0.9;
            animation: flipPage 5s infinite alternate ease-in-out;
            transform-origin: left center;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        }

        .page:nth-child(1) {
            background-color: #c1e4da;
            animation-delay: 0s;
        }

        .page:nth-child(2) {
            background-color: #7f8fa6;
            animation-delay: 0.5s;
        }

        .page:nth-child(3) {
            background-color: #70a1ff;
            animation-delay: 1s;
        }

        .page:nth-child(4) {
            background-color: #535c68;
            animation-delay: 1.5s;
        }

        .page:nth-child(5) {
            background-color: #dff9fb;
            animation-delay: 2s;
        }

        .page:nth-child(6) {
            background-color: #2c3e50;
            animation-delay: 2.5s;
        }

        @keyframes flipPage {
            0% {
                transform: rotateY(0deg);
            }

            100% {
                transform: rotateY(-180deg);
            }
        }
    </style>
</head>

<body>
    <div class="book">
        <div class="page"></div>
        <div class="page"></div>
        <div class="page"></div>
        <div class="page"></div>
        <div class="page"></div>
        <div class="page"></div>
    </div>
</body>

</html>
