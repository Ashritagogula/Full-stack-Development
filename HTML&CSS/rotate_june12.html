<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rotate</title>
    <style>
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            top: 100px;
        }

        .demo, .demo1{
            height: 100px;
            width: 100px;
            background-color: red;
            border: 1px solid black;
            margin: 10px;
        }

        .demo:hover{
            transform: rotateX(30deg);
        }

        .demo1:hover{
            transform: rotateY(30deg);
        }

        .demo2{
            height: 100px;
            width: 100px;
            background-color: rebeccapurple;
            color: white;
            font-size: 15px;
          /*  transform: rotateX(90deg); */
            
        }

        .demo2:hover{
            transform: rotateX(90deg);
        }

        .demo3{
            height: 100px;
            width: 100px;
            background-color: red;
            color: white;
            font-size: 15px;
          /*  transform: rotateX(90deg); */
            margin: 10px;
            position: relative;
            top: 125px;
            transform: matrix(1,0,10,1,-10,-10);
            
        }
        

    </style>
</head>
<body>
    <div class="demo"></div>
    <div class="demo1"></div>
    <div class="demo3"></div>
    <div class="demo2">Touch me to disappear</div>
</body>
</html>
