<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transitions</title>
    <style>
        body{
            width: 100%;
            height: 100svh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: justify;
        }
        .width{
            width: 100px;
            height: 100px;
            background-color: red;
            transition-property: width;
            transition-duration: 2s;
        }
        .width:hover{
            width: 200px;
        }

        .width1{
            width: 100px;
            height: 100px;
            background-color: rgb(128, 184, 143);
            transition-property: all;
            transition-duration: 2s;
        }
        .width1:hover{
            width: 200px;
            background-color: rgb(169, 201, 141);
            background-image: url(ashrita.png);
            background-size: cover;
            height: 200px;
            transform: rotate(10deg);
            border: 2px solid black;
        }

        .color{
            width: 100px;
            height: 100px;
            background-color: red;
            transition-property: background-color;
            transition-duration: 3s;
            margin: 10px;
            /*transition: width 2s ease-in 3s;*/
            position: relative;
            top: -10px;
        }
        .color:hover{
            background-color: black;
        }

        .height{
            width: 100px;
            height: 100px;
            background-color: red;
            transition-property: height;
            transition-duration: 1s;
            transition-delay: 1s;
            /*transition-timing-function: ease-in;*/
        }
        .height:hover{
            height: 200px;
        }
        .con1,.all{
            display: flex;
            flex-direction: row;
            border: 2px solid black;
            background-color: rgb(134, 182, 164);
            margin: 30px;
        }



    </style>
</head>
<body>
    <section class="con1">
    <div class="width"></div>
    <div class="color"></div>
    <div class="height"></div>
    </section>

    <section class="all">
        <div class="width1"></div>
        </section>
</body>
</html>
