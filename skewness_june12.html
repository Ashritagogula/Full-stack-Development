<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Transform Properties</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 60px;
            font-family: sans-serif;
            background-color: #f9f9f9;
            padding: 40px;
        }

        .column {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .scale-2 {
            transform: scale(2);
        }
    </style>
</head>

<body>

    <div class="column">
        <h2>skewY</h2>
        

    <div class="column">
        <h2>scale</h2>
        <div class="box scale-1-2">1.2</div>
        <div class="box scale-1-4">1.4</div>
        <div class="box scale-1-6">1.6</div>
        <div class="box scale-1-8">1.8</div>
        <div class="box scale-2">2</div>
    </div>

</body>

</html>
