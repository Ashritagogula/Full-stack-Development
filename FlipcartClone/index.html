<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipkart</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&display=swap" rel="stylesheet">

</head>
<body>
    <section class="container">
        <div class="demo1">
        <img src="flipkart_logo.svg" class="logo">
        <div class="search"><i class="fa-solid fa-magnifying-glass"></i><input type="text" placeholder="Search for Products, Brands and More" class="text"></div>
        </div>
        <div class="demo2">
        <div class="login"><img src="icon.svg"><span>Login</span> <i class="fa-solid fa-caret-down"></i> </div>
        <div class="cart"><img src="cart.svg"><span>Cart</span></div>
        <div class="seller"><img src="seller.svg"><span>Become a Seller</span></div>
        <div class="menu"><img src="menu.svg"></div>
    </div>
    </section>

    <section class="Medium">
        <div class="one">
            <div class="head">
                <h4>Hair and skin care for monsoon</h4>
                <p class="circle">></p>
            </div>
            <div class="gridcontainer">
            <div class="gridsystem">
                <div class="box1">
                    <img src="fashwash.png" class="fash">
                    <h5>Fash wash</h5>
                    <p>Min. 50% Off</p>
                </div>
                <div class="box2">
                    <img src="hairserum.png" class="fash">
                    <h5>Hair Serum</h5>
                    <p>Min. 50% Off</p>

                </div>
                <div class="box3">
                    <img src="hairclaw.png" class="fash">
                    <h5>Hair Claw</h5>
                    <p>Min. 50% Off</p>

                </div>
                <div class="box4">
                    <img src="bathsoap.png" class="fash">
                    <h5>Bath Soap</h5>
                    <p>Min. 50% Off</p>
                </div>
            </div>
        </div>
            
        </div>
        <div class="two">
            <div class="head">
                <h4>Fashion's top deals</h4>
                <p class="circle">></p>
            </div>
            <div class="gridsystem">
                <div class="box1">
                    <img src="slippers.png" class="fash">
                    <h5>slippers</h5>
                    <p>Min. 50% Off</p>
                </div>
                <div class="box2">
                    <img src="tshirts.png" class="fash">
                    <h5>tshirts</h5>
                    <p>Min. 50% Off</p>
            
                </div>
                <div class="box3">
                    <img src="casualshirt.png" class="fash">
                    <h5>casualshirt</h5>
                    <p>Min. 50% Off</p>
            
                </div>
                <div class="box4">
                    <img src="saree.png" class="fash">
                    <h5>saree</h5>
                    <p>Min. 50% Off</p>
                </div>
            </div>
        </div>
        <div class="three">
            <img src="right.png" class="right">
        </div>
    </section>
</body>
</html>
